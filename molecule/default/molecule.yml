---
dependency:
  name: galaxy
driver:
  name: docker
platforms:
  - name: "$MOLECULE_DISTRO"
    image: "geerlingguy/docker-${MOLECULE_DISTRO:-rockylinux9}-ansible:latest"
    command: ${MOLECULE_DOCKER_COMMAND:-""}
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true
provisioner:
  name: ansible
  inventory:
    host_vars:
      centos7:
        jenkins_nginx_proxy: false
