---
__jenkins_repo_type: "{{ 'rpm' if (jenkins_version is version('2.528.3', '>')) else 'redhat' }}"
__jenkins_repo_path: "{{ __jenkins_repo_type ~ ('-stable' if (jenkins_prefer_lts | bool) else '') }}"
__jenkins_repo_key_file: "{{ 'jenkins.io-2026.key' if (jenkins_version is version('2.528.3', '>')) else 'jenkins.io-2023.key' }}"

__jenkins_rpm_release: "{{ '1' if (jenkins_version is version('2.528.3', '>')) else '1.1' }}"
__jenkins_package_name: "jenkins-{{ jenkins_version }}-{{ __jenkins_rpm_release }}.noarch.rpm"
__jenkins_repo_key_url: https://pkg.jenkins.io/{{ __jenkins_repo_path }}/{{ __jenkins_repo_key_file }}
__jenkins_pkg_url: https://get.jenkins.io/{{ __jenkins_repo_path }}
